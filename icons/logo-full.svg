<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Fraunces, Georgia, 'Times New Roman', serif">
  <!-- Large italic black C with column + star inside -->
  <text x="600" y="475" font-size="650" font-weight="700"
        text-anchor="middle" fill="#0B0E14" font-style="italic">C</text>

  <!-- Greek column (gold) -->
  <g fill="#B89968">
    <g transform="translate(495, 308)">
      <rect x="-4" y="28" width="100" height="7"/>
      <path d="M0 20 Q48 12 96 20 v8 H0 z"/>
      <circle cx="8"  cy="18" r="12"/><circle cx="8"  cy="18" r="5" fill="#FBFAF6"/>
      <circle cx="88" cy="18" r="12"/><circle cx="88" cy="18" r="5" fill="#FBFAF6"/>
    </g>
    <g transform="translate(495, 345)">
      <rect x="12" y="0" width="72" height="160"/>
      <line x1="26" y1="4" x2="26" y2="156" stroke="#FBFAF6" stroke-width="2.5"/>
      <line x1="42" y1="4" x2="42" y2="156" stroke="#FBFAF6" stroke-width="2.5"/>
      <line x1="58" y1="4" x2="58" y2="156" stroke="#FBFAF6" stroke-width="2.5"/>
      <line x1="74" y1="4" x2="74" y2="156" stroke="#FBFAF6" stroke-width="2.5"/>
    </g>
    <g transform="translate(495, 507)">
      <rect x="10" y="0" width="76" height="8"/>
      <ellipse cx="48" cy="12" rx="46" ry="6"/>
      <rect x="-2" y="18" width="100" height="8"/>
    </g>
  </g>

  <!-- 4-point star -->
  <g transform="translate(715, 435)" fill="#B89968">
    <path d="M0 -78 C 8 -22, 22 -8, 78 0 C 22 8, 8 22, 0 78 C -8 22, -22 8, -78 0 C -22 -8, -8 -22, 0 -78 Z"/>
  </g>

  <!-- "Cultoko" wordmark -->
  <text x="600" y="720" font-size="150" font-weight="500" font-style="italic"
        text-anchor="middle" fill="#0B0E14">Cultoko</text>

  <!-- Decorative separator -->
  <line x1="420" y1="765" x2="585" y2="765" stroke="#B89968" stroke-width="1.6"/>
  <g transform="translate(600, 765) rotate(45)" fill="#B89968"><rect x="-7" y="-7" width="14" height="14"/></g>
  <line x1="615" y1="765" x2="780" y2="765" stroke="#B89968" stroke-width="1.6"/>

  <!-- Tagline -->
  <text x="600" y="830" font-size="36" font-weight="500"
        text-anchor="middle" fill="#B89968" letter-spacing="14">JEUX DE CULTURE</text>
</svg>
