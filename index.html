<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#FBFAF6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Cultoko" />
  <title>Cultoko — Mini-jeux de culture générale</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg?v=8" />
  <link rel="shortcut icon" href="icons/icon-192.png?v=8" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css?v=8" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button id="backBtn" class="icon-btn hidden" aria-label="Retour">‹</button>
      <div class="topbar-brand">
        <img id="topLogo" class="topbar-logo" src="icons/icon.svg?v=8" alt="Cultoko" />
        <h1 id="topTitle" class="topbar-title"></h1>
      </div>
      <div class="topbar-right">
        <button id="bankBadge" class="bank-badge" aria-label="Banque"></button>
        <button id="langBtn" class="icon-btn lang-btn" aria-label="Langue">FR</button>
      </div>
    </header>

    <main id="screen" class="screen">
      <!-- Les écrans sont injectés ici par app.js -->
    </main>

    <footer class="bottom-bar hidden" id="bottomBar">
      <span id="bottomScore" class="score"></span>
      <span id="bottomTimer" class="timer"></span>
    </footer>
  </div>

  <!-- Modules de l'app -->
  <script src="js/utils.js?v=8"></script>
  <script src="js/icons.js?v=8"></script>
  <script src="js/bank.js?v=8"></script>
  <script src="js/character.js?v=8"></script>
  <script src="js/i18n.js?v=8"></script>
  <script src="js/data.js?v=8"></script>
  <script src="js/games/quiz.js?v=8"></script>
  <script src="js/games/timeAttack.js?v=8"></script>
  <script src="js/games/trueFalse.js?v=8"></script>
  <script src="js/games/memory.js?v=8"></script>
  <script src="js/games/guessImage.js?v=8"></script>
  <script src="js/app.js?v=8"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW failed:', err));
      });
    }
  </script>
</body>
</html>
