<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0f1226" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cultura" />
  <title>Cultura — Mini-jeux de culture générale</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <button id="backBtn" class="icon-btn hidden" aria-label="Retour">‹</button>
      <h1 id="topTitle" class="topbar-title">Cultura</h1>
      <div class="topbar-right">
        <button id="langBtn" class="icon-btn lang-btn" aria-label="Langue">FR</button>
      </div>
    </header>

    <main id="screen" class="screen">
      <!-- Les écrans sont injectés ici par app.js -->
    </main>

    <footer class="bottom-bar hidden" id="bottomBar">
      <span id="bottomScore" class="score"></span>
      <span id="bottomTimer" class="timer"></span>
    </footer>
  </div>

  <!-- Modules de l'app -->
  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/games/quiz.js"></script>
  <script src="js/games/timeAttack.js"></script>
  <script src="js/games/trueFalse.js"></script>
  <script src="js/games/memory.js"></script>
  <script src="js/games/guessImage.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW failed:', err));
      });
    }
  </script>
</body>
</html>
